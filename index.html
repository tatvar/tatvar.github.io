<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мерчант шалгагч</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        color: white;
      }
    </style>
  </head>
  <!-- <body class="bg-gradient-to-b from-teal-500 min-h-screen flex items-center flex-col justify-center"> -->
  <body style="background-image: url(wallpaper.jpg); background-size: cover;" class="min-h-screen flex items-center flex-col justify-center">
    <main class="container max-w-md bg-white/30 backdrop-blur-md shadow-lg rounded-lg p-8 font-mono text-base transition-all ease-in-out delay-150">
      <h1 class="text-2xl font-bold text-center mb-4 text-white">Татвар төлөгчийн мэдээлэл шалгагч апп</h1> 
     <!-- <p id="author" class="my-2 text-center text-sm">By: Цэнгүүнбилэг</p>  -->
      <div class="w-full">
        <form role="search" id="search-form" class="mb-3">
          <label for="search-input" class="text-white block mb-2">Регистрийн дугаар оруулна уу:</label>
          <div class="flex w-full gap-2">
            <div class="relative flex-1">
              <input 
                type="text" 
                name="pokemon" 
                id="search-input" 
                required
                placeholder="Регистрийн дугаар" 
                class="w-full border-2 text-pink-200 bg-transparent rounded p-2 pr-20 placeholder-violet-200 focus:outline-none focus:ring-2 focus:ring-violet-400" 
              />
              <button 
                type="button"
                id="clear-button" 
                class="absolute right-2 top-1/2 transform -translate-y-1/2 text-xs px-2 py-1 bg-red-500 text-white rounded hover:bg-red-700 transition-all hidden"
                onclick="clearInput()"
              >
                Арилгах
              </button>
            </div>
            <button 
              id="search-button" 
              class="px-6 py-2 bg-pink-400 text-white rounded-md hover:bg-pink-600 transition-all ease-in whitespace-nowrap"
            >
              Хайх
            </button>
          </div>
        </form>
        <div class="output">
          <div class="top-container mt-4" id="top-container">
            <div class="name-and-id">
              <span id="pokemon-name"></span>
              <span id="pokemon-id"></span>
            </div>
            <div class="size">
              <span id="weight"></span>
              <span id="height"></span>
            </div>
            <div id="sprite-container" class="sprite-container flex justify-center"></div>
            <div id="types"></div>
          </div>
          <div class="bottom-container mt-4">
            <table class="w-full border-2 border-separate border-pink-300 border-spacing-2">
              <tr>
                <th class="border border-slate-300 bg-pink-400">Мэдээ</th>
                <th class="border border-slate-300 p-1 bg-pink-400">Хариу</th>
              </tr>
              <tr>
                <td class="border border-slate-300 p-1 ">НӨАТ төлөгч эсэх</td>
                <td id="hp" class="border border-slate-300 p-1 "></td>
              </tr>
              <tr>
                <td class="border border-slate-300 p-1 ">НХАТ төлөгч эсэх</td>
                <td id="attack" class="border border-slate-300 p-1 "></td>
              </tr>
              <tr>
                <td class="border border-slate-300 p-1 ">Олдсон эсэх</td>
                <td id="defense" class="border border-slate-300 p-1 "></td>
              </tr>
              <tr>
                <td class="border border-slate-300 p-1 ">НӨАТ төлөгч болсон огноо</td>
                <td id="special-attack" class="border border-slate-300 p-1"></td>
              </tr>
            </table>
          </div>
        </div>
      </div>
      <div id="copyright">
        <p class="text-sm text-center mt-6">
      Зөвхөн Датакейр компанийн <span class="font-semibold">Call Center</span>-нхэдээ зориулав ❤️
    </p>
      </div>
      <script src="./script.js"></script>
    </main>
  </body>
  
</html>
